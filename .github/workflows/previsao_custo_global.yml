name: 2B - Previsao Global Custos (diario)

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: malha-ia-previsao-custos
  cancel-in-progress: false

jobs:
  sincronizar_hub:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias leves
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Baixar previsoes publicas do hub
        run: python scripts/baixar_dados_hub.py

      - name: Gerar CSVs canonicos
        run: python scripts/exportar_dados_csv.py

      - name: Commitar atualizacoes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dados dados_csv
          if git diff --cached --quiet; then
            echo "Sem alteracoes nos dados."
          else
            git commit -m "Atualiza previsao de custos do hub"
            git push
          fi
