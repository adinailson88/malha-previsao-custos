name: Atualizar dados do hub

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

concurrency:
  group: atualizar-dados-hub
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Baixar dados do hub
        run: python scripts/baixar_dados_hub.py

      - name: Gerar CSVs canonicos
        run: python scripts/exportar_dados_csv.py

      - name: Commitar atualizacoes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dados dados_csv
          if git diff --cached --quiet; then
            echo "Sem alteracoes nos dados."
          else
            git commit -m "Atualiza dados do hub malha-ia"
            git push
          fi
